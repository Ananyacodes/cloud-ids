apiVersion: apps/v1
kind: Deployment
metadata:
  name: ids-inference
  namespace: ids
  labels:
    app: ids-inference
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ids-inference
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ids-inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ids-sa
      containers:
        - name: ids-inference
          image: gcr.io/YOUR_PROJECT/cloud-ids:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ids-config
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
          volumeMounts:
            - name: model-cache
              mountPath: /tmp/ids-models
            - name: config-volume
              mountPath: /app/configs
      volumes:
        - name: model-cache
          emptyDir: {}
        - name: config-volume
          configMap:
            name: ids-config
